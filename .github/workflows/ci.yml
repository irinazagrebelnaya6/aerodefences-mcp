name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aerodefences
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      ADD_DB_HOST: 127.0.0.1
      ADD_DB_PORT: "3306"
      ADD_DB_USER: root
      ADD_DB_PASSWORD: root
      ADD_DB_NAME: aerodefences
      ADD_ROLE: admin        # у CI дозволяємо write-тести (round-trip)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Seed database (db/init.sql)
        run: mysql -h 127.0.0.1 -P 3306 -uroot -proot < db/init.sql

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q
